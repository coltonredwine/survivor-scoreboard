<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Survivor Scoreboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-wrap">
      <header class="topbar">
        <img id="logo" class="logo" src="/assets/logo.png" alt="Logo" />
        <p class="subtitle">S50 Finale Watch Party</p>
        <h1>Scoreboard</h1>
      </header>

      <main>
        <section id="thermometerGrid" class="thermometer-grid"></section>
      </main>
    </div>

    <button id="helpButton" class="help-button" type="button" aria-label="Show scoring help">?</button>

    <div id="helpModal" class="help-modal" role="dialog" aria-modal="true" aria-labelledby="helpTitle" hidden>
      <div class="help-modal-card">
        <button id="helpClose" class="help-close" type="button" aria-label="Close scoring help">x</button>
        <h2 id="helpTitle">Scoring</h2>
        <ul>
          <li>1 drink = 2 points</li>
          <li>Trivia question = 1 point</li>
          <li>Winning a challenge earns points</li>
          <li>Members of the winning tribe at the end of the evening receive a prize</li>
        </ul>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
  </html>
